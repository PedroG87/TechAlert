<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechAlert</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .auth-container { max-width: 450px; margin-top: 80px; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="http://localhost:8080/home/">Home</a>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        Area de Usuário
                    </a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="#">Cadastro de áreas de risco</a></li>
                        <li><a class="dropdown-item" href="#">Consultar areas de risco </a></li>
                        <li><a class="dropdown-item" href="#">Registro de ocorrências </a></li>
                    </ul>
                </li>
        </div>
    </div>
</nav>
<div class="container d-flex justify-content-center">
    <div class="auth-container w-100 shadow-lg p-3 mb-5 bg-white rounded">

        <ul class="nav nav-pills nav-justified mb-3" id="pills-tab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="pills-login-tab" data-bs-toggle="pill" data-bs-target="#pills-login" type="button" role="tab">Login</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="pills-register-tab" data-bs-toggle="pill" data-bs-target="#pills-register" type="button" role="tab">Cadastro</button>
            </li>
        </ul>

        <div class="tab-content" id="pills-tabContent">
            <div class="tab-pane fade show active" id="pills-login" role="tabpanel">
                <form>
                    <div class="mb-3">
                        <label class="form-label">E-mail</label>
                        <input type="email" class="form-control" placeholder="exemplo@email.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Senha</label>
                        <input type="password" class="form-control">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 shadow-sm">Entrar</button>
                </form>
            </div>

            <div class="tab-pane fade" id="pills-register" role="tabpanel">
                <form>
                    <div class="mb-3 text-center">
                        <small class="text-muted">Escolha seu perfil: Cidadão ou Operador</small>
                        <div class="d-flex gap-2 mt-2">
                            <button type="button" class="btn btn-outline-success w-50 shadow-sm">Operador</button>
                            <button type="button" class="btn btn-outline-success w-50 shadow-sm">Cidadão</button>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nome Completo</label>
                        <input type="text" class="form-control">
                        <label class="form-label">Email</label>
                        <input type="text" class="form-control">
                        <label class="form-label">Defina uma senha</label>
                        <input type="text" class="form-control">
                        <label class="form-label">CPF</label>
                        <input type="text" class="form-control">
                        <label class="form-label">Data de Nascimento</label>
                        <input type="text" class="form-control">
                        <label class="form-label">Endereço</label>
                        <input type="text" class="form-control">
                    </div>
                    <button type="submit" class="btn btn-success w-100 shadow-sm">Finalizar Cadastro</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
